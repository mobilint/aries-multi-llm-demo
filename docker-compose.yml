# You can add server-side setting whatever you want according to the
# proper operation server side environment.
#
networks:
  mblt_int:
    external: true

services:
  aries_multi_llm_frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile

    hostname: aries-multi-llm-frontend

    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
      - next:/app/.next

    ports:
      - 3000:3000

    networks:
      - mblt_int

  aries_multi_llm_backend:
    build:
      context: ./backend
      dockerfile: backend.Dockerfile

    hostname: aries-multi-llm-backend

    privileged: true

    environment:
      - HF_HUB_OFFLINE=1

    volumes:
      - ./backend/src:/src
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - /dev:/dev

    ports:
      - 5000:5000

    networks:
      - mblt_int
    
volumes:
  node_modules:
  next: